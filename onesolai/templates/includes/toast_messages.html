<style>
    .toast-container {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 400px;
        width: calc(100% - 48px);
        pointer-events: none;
    }
    .toast-item {
        pointer-events: auto;
        background: #180836;
        background: linear-gradient(135deg, #180836 0%, #12062b 100%);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-left: 4px solid #8E6CFF;
        border-radius: 12px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45), 0 0 15px rgba(139, 61, 245, 0.25);
        color: #FFF;
        font-size: 14px;
        font-weight: 500;
        line-height: 1.4;
        animation: toastSlideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        transition: all 0.35s ease;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }
    .toast-item.toast-success {
        border-left-color: #4EC97E;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45), 0 0 15px rgba(78, 201, 126, 0.25);
    }
    .toast-item.toast-error, .toast-item.toast-danger {
        border-left-color: #FF4D4D;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45), 0 0 15px rgba(255, 77, 77, 0.25);
    }
    .toast-item.toast-warning {
        border-left-color: #FFB800;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45), 0 0 15px rgba(255, 184, 0, 0.25);
    }
    .toast-item.toast-info {
        border-left-color: #8E6CFF;
    }
    .toast-icon {
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .toast-content {
        flex: 1;
        word-break: break-word;
    }
    .toast-close {
        background: transparent;
        border: none;
        color: #AEB5CA;
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease;
        flex-shrink: 0;
    }
    .toast-close:hover {
        color: #FFF;
    }
    @keyframes toastSlideIn {
        0% {
            opacity: 0;
            transform: translateX(100px) scale(0.95);
        }
        100% {
            opacity: 1;
            transform: translateX(0) scale(1);
        }
    }
    .toast-item.toast-hiding {
        opacity: 0;
        transform: translateX(100px) scale(0.95);
    }
    @media (max-width: 480px) {
        .toast-container {
            top: 16px;
            right: 16px;
            width: calc(100% - 32px);
        }
    }
</style>

<div id="toast-container" class="toast-container">
    {% if messages %}
        {% for message in messages %}
            <div class="toast-item toast-{{ message.tags|default:'info' }}">
                <div class="toast-icon">
                    {% if 'success' in message.tags %}
                        <i class="fa-solid fa-circle-check" style="color: #4EC97E;"></i>
                    {% elif 'error' in message.tags or 'danger' in message.tags %}
                        <i class="fa-solid fa-circle-xmark" style="color: #FF4D4D;"></i>
                    {% elif 'warning' in message.tags %}
                        <i class="fa-solid fa-triangle-exclamation" style="color: #FFB800;"></i>
                    {% else %}
                        <i class="fa-solid fa-circle-info" style="color: #8E6CFF;"></i>
                    {% endif %}
                </div>
                <div class="toast-content">{{ message }}</div>
                <button class="toast-close" onclick="dismissToast(this.parentElement)">&times;</button>
            </div>
        {% endfor %}
    {% endif %}
</div>

<script>
    function dismissToast(el) {
        if (!el) return;
        el.classList.add('toast-hiding');
        setTimeout(function() {
            if (el.parentNode) el.parentNode.removeChild(el);
        }, 350);
    }

    window.showToast = function(message, type) {
        type = type || 'info';
        var container = document.getElementById('toast-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'toast-container';
            document.body.appendChild(container);
        }

        var iconHtml = '<i class="fa-solid fa-circle-info" style="color: #8E6CFF;"></i>';
        if (type === 'success') {
            iconHtml = '<i class="fa-solid fa-circle-check" style="color: #4EC97E;"></i>';
        } else if (type === 'error' || type === 'danger') {
            iconHtml = '<i class="fa-solid fa-circle-xmark" style="color: #FF4D4D;"></i>';
        } else if (type === 'warning') {
            iconHtml = '<i class="fa-solid fa-triangle-exclamation" style="color: #FFB800;"></i>';
        }

        var toast = document.createElement('div');
        toast.className = 'toast-item toast-' + type;
        toast.innerHTML = '<div class="toast-icon">' + iconHtml + '</div>' +
                          '<div class="toast-content">' + message + '</div>' +
                          '<button class="toast-close" onclick="dismissToast(this.parentElement)">&times;</button>';

        container.appendChild(toast);

        setTimeout(function() {
            dismissToast(toast);
        }, 4000);
    };

    document.addEventListener("DOMContentLoaded", function() {
        var items = document.querySelectorAll('#toast-container .toast-item');
        items.forEach(function(item) {
            setTimeout(function() {
                dismissToast(item);
            }, 4000);
        });
    });
</script>
